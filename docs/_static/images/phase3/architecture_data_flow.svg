<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">GWexpy architecture data flow</title>
  <desc id="desc">A static data flow diagram showing raw arrays and GWpy objects flowing into TimeSeries, FrequencySeries, ScalarField, TimeSeriesDict, TimeSeriesMatrix, flattened features, analysis APIs, metadata restoration, field transforms, and downstream outputs, with axis metadata preserved throughout.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 14; ry: 14; }
      .meta { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 14; ry: 14; }
      .analysis { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 14; ry: 14; }
      .out { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 14; ry: 14; }
      .text { fill: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 24px; }
      .small { font-size: 20px; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .meta-arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowhead-blue); }
      .label { fill: #374151; font-family: Arial, Helvetica, sans-serif; font-size: 20px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>

  <rect class="box" x="60" y="80" width="230" height="80"/>
  <text class="text" x="175" y="115" text-anchor="middle">Raw arrays</text>
  <text class="text" x="175" y="145" text-anchor="middle">/ GWpy objects</text>

  <rect class="box" x="360" y="70" width="270" height="90"/>
  <text class="text" x="495" y="108" text-anchor="middle">TimeSeries /</text>
  <text class="text" x="495" y="140" text-anchor="middle">FrequencySeries</text>

  <rect class="box" x="360" y="210" width="270" height="80"/>
  <text class="text" x="495" y="258" text-anchor="middle">ScalarField</text>

  <rect class="box" x="700" y="70" width="220" height="80"/>
  <text class="text" x="810" y="118" text-anchor="middle">TimeSeriesDict</text>

  <rect class="box" x="980" y="70" width="180" height="80"/>
  <text class="text" x="1070" y="118" text-anchor="middle">TimeSeriesMatrix</text>

  <rect class="analysis" x="930" y="200" width="230" height="90"/>
  <text class="text" x="1045" y="238" text-anchor="middle">Flatten to 2D</text>
  <text class="text" x="1045" y="270" text-anchor="middle">features</text>

  <rect class="analysis" x="890" y="350" width="270" height="90"/>
  <text class="text" x="1025" y="388" text-anchor="middle">Analysis / ML /</text>
  <text class="text" x="1025" y="420" text-anchor="middle">fitting APIs</text>

  <rect class="box" x="930" y="500" width="230" height="90"/>
  <text class="text" x="1045" y="538" text-anchor="middle">Restore matrix</text>
  <text class="text" x="1045" y="570" text-anchor="middle">metadata</text>

  <rect class="box" x="360" y="350" width="270" height="90"/>
  <text class="text" x="495" y="388" text-anchor="middle">Field slicing /</text>
  <text class="text" x="495" y="420" text-anchor="middle">indexing</text>

  <rect class="box" x="360" y="500" width="270" height="90"/>
  <text class="text" x="495" y="538" text-anchor="middle">Field-aware</text>
  <text class="text" x="495" y="570" text-anchor="middle">transforms</text>

  <rect class="out" x="700" y="620" width="300" height="90"/>
  <text class="text" x="850" y="658" text-anchor="middle">Plots / reports /</text>
  <text class="text" x="850" y="690" text-anchor="middle">downstream containers</text>

  <rect class="meta" x="60" y="610" width="250" height="110"/>
  <text class="text" x="185" y="648" text-anchor="middle">Axis metadata</text>
  <text class="text small" x="185" y="680" text-anchor="middle">units / GPS /</text>
  <text class="text small" x="185" y="706" text-anchor="middle">spatial grid</text>

  <path class="arrow" d="M 290 120 L 360 115"/>
  <path class="arrow" d="M 290 135 C 315 145, 330 210, 360 245"/>
  <path class="arrow" d="M 630 115 L 700 110"/>
  <path class="arrow" d="M 920 110 L 980 110"/>
  <path class="arrow" d="M 1070 150 L 1070 200"/>
  <path class="arrow" d="M 1045 290 L 1025 350"/>
  <path class="arrow" d="M 1025 440 L 1045 500"/>
  <path class="arrow" d="M 630 250 L 740 250 C 840 250, 900 520, 930 545"/>
  <path class="arrow" d="M 630 250 L 495 350"/>
  <path class="arrow" d="M 495 440 L 495 500"/>
  <path class="arrow" d="M 630 545 L 700 650"/>
  <path class="arrow" d="M 1045 590 L 940 650"/>

  <path class="meta-arrow" d="M 185 610 L 185 160 C 185 110, 300 110, 360 110"/>
  <path class="meta-arrow" d="M 200 610 L 200 270 C 200 245, 300 245, 360 245"/>
  <path class="meta-arrow" d="M 215 610 L 215 150 C 215 90, 890 90, 980 90"/>
  <path class="meta-arrow" d="M 230 610 C 230 585, 820 585, 930 545"/>
  <path class="meta-arrow" d="M 245 610 C 245 600, 300 600, 360 545"/>

  <text class="label" x="708" y="185">matrix-analysis path</text>
  <text class="label" x="558" y="470">field-analysis path</text>
  <text class="label" x="90" y="585">metadata preserved</text>
</svg>
