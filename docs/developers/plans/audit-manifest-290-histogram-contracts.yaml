contracts_covered:
  - "Histogram values and edges preserve Quantity units; value aliases values; bin_widths and xindex carry xunit."
  - "Histogram name and channel are passive metadata for the covered construction, fill, and rebin paths."
  - "sumw2 and cov preserve expected units and shapes; errors uses cov diagonal before sumw2 when both are present."
  - "fill() returns a new Histogram and updates weighted values, sumw2, underflow, overflow, and flow-bin sumw2 without mutating the original."
  - "rebin() uses total-bin overlap semantics and preserves value unit, edge unit, name, channel, covariance, and sumw2 behavior for the covered case."
  - "integral() uses total-bin partial-overlap semantics and returns a value-unit Quantity."
  - "HistogramDict.rebin() and HistogramList.rebin() preserve container type and iteration order in the covered cases."
  - "gwexpy.segments proxies representative GWpy symbols through __getattr__, __all__, and __dir__."

known_gaps_recorded:
