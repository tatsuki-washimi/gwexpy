contracts_covered:
  - "gwexpy.time exports to_gps/from_gps/tconvert from gwexpy.time.core while proxying representative GWpy names such as LIGOTimeGPS."
  - "to_gps numeric scalar returns a GPS-equivalent GWpy/LAL scalar object; numeric vectors return numpy float64 arrays."
  - "to_gps ISO string and UTC datetime vectors match astropy GPS values for stable non-leap inputs."
  - "from_gps scalar matches GWpy timezone-aware UTC datetime behavior for the covered stable GPS input."
  - "from_gps numeric vectors currently return numpy object arrays of timezone-naive Python datetimes via astropy Time(..., format='gps').to_datetime()."
