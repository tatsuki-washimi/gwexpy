  - "datetime_utc_to_gps treats naive datetimes as UTC and maps aware non-UTC inputs by UTC instant for the covered ordinary date."
  - "gps_to_datetime_utc returns timezone-aware UTC datetime and round-trips stable non-leap GPS values through datetime_utc_to_gps."
  - "Existing mocked leap-second policy coverage remains in tests/interop/test_time.py; no network/IERS-dependent boundary tests were added."

