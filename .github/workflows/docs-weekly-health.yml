name: Documentation Weekly Health Check

on:
  schedule:
    - cron: "0 0 * * 1"  # Every Monday at 09:00 JST (00:00 UTC)
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  weekly-health:
    name: Docs Health Check (Linkcheck, Terms, Sync)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 pandoc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Essential for scripts
          pip install requests
          # Essential for Sphinx build (linkcheck requires theme etc.)
          pip install 'sphinx>=6,<8' sphinx_rtd_theme myst-parser nbsphinx sphinx-design sphinx-intl
          # Install gwexpy with all dependencies to ensure env is correct
          pip install -e ".[all]"

      - name: Terminology & Sync Check
        run: |
          python scripts/check_terms.py
          python scripts/check_docs_sync.py

      - name: Check External Links (Script)
        run: |
          python scripts/check_external_links.py

      - name: Sphinx Linkcheck (Internal & External)
        run: |
          cd docs
          # Linkcheck often has flaky external sites, so we log it
          sphinx-build -b linkcheck . _build/linkcheck

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const run_url = `https://github.com/${owner}/${repo}/actions/runs/${run_id}`;
            const title = "🚨 Weekly Documentation Health Check Failed";
            const body = `The weekly documentation health check has failed. Please review the logs to identify broken links or terminology inconsistencies.
            
            - **Build Log:** ${run_url}
            - **Detection Date:** ${new Date().toISOString()}
            
            ### Checklist:
            - [ ] Check for broken external links (check_external_links.py output)
            - [ ] Check for sphinx-build linkcheck output for internal/external broken links
            - [ ] Check for terminology mismatches (check_terms.py)
            - [ ] Check for JA/EN synchronization issues (check_docs_sync.py)`;
            
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["documentation", "bug", "automated-report"]
            });
