name: Documentation Weekly Health Check

on:
  schedule:
    - cron: "0 0 * * 1"  # Every Monday at 09:00 JST (00:00 UTC)
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  weekly-health:
    name: Docs Health Check (Linkcheck, Terms, Sync)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 pandoc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Essential for scripts
          pip install requests
          # Shared docs toolchain used by docs build and linkcheck.
          pip install -r docs/requirements.txt
          pip install sphinx-intl
          # Install gwexpy with all dependencies to ensure env is correct
          pip install -e ".[all]"

      - name: Terminology & Sync Check
        run: |
          python scripts/check_terms.py
          python scripts/check_docs_sync.py

      - name: Check External Links (Script)
        id: external_links
        continue-on-error: true
        run: |
          python scripts/check_external_links.py

      - name: Sphinx Linkcheck (Internal & External)
        id: sphinx_linkcheck
        run: |
          cd docs
          # Linkcheck often has flaky external sites, so we log it
          sphinx-build -b linkcheck . _build/linkcheck

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const run_url = `https://github.com/${owner}/${repo}/actions/runs/${run_id}`;
            const date = new Date().toISOString();

            const desiredLabels = ["documentation", "automated-report", "needs-triage"];
            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            const labels = desiredLabels.filter((name) =>
              repoLabels.some((label) => label.name === name),
            );

            const title = "🚨 Weekly Documentation Health Check Failed";
            const body = `The weekly documentation health check has failed. Please review the logs to identify broken links or terminology inconsistencies.
            
            - **Build Log:** ${run_url}
            - **Detection Date:** ${date}
            
            ### Quick Analysis:
            - External Link Script: ${process.env.STEP_EXTERNAL_FAILED === 'true' ? '❌ Failed' : '✅ Passed'}
            - Sphinx Linkcheck: ${process.env.STEP_SPHINX_FAILED === 'true' ? '❌ Failed' : '✅ Passed'}
            
            ### Checklist & Reproduction:
            - [ ] **External Links**: Run \`python scripts/check_external_links.py\` locally.
            - [ ] **Internal Links**: Check Sphinx linkcheck output in the log.
            - [ ] **Terminology**: Run \`python scripts/check_terms.py\` locally.
            - [ ] **JA/EN Sync**: Run \`python scripts/check_docs_sync.py\` locally.
            
            *Note: If a domain is internal (LIGO/KAGRA), add it to whitelist in scripts/check_external_links.py and docs/conf.py.*`;
            
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              ...(labels.length ? { labels } : {}),
            });
        env:
          STEP_EXTERNAL_FAILED: ${{ steps.external_links.outcome == 'failure' }}
          STEP_SPHINX_FAILED: ${{ steps.sphinx_linkcheck.outcome == 'failure' }}
