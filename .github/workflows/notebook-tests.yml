name: Notebook Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/web/en/user_guide/tutorials/**'
      - 'gwexpy/table/**'
      - 'gwexpy/noise/**'
      - 'gwexpy/fitting/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/web/en/user_guide/tutorials/**'
      - 'gwexpy/table/**'
      - 'gwexpy/noise/**'
      - 'gwexpy/fitting/**'

jobs:
  notebook-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0" "scipy<1.14" "astropy<7.0" pandas matplotlib h5py "gwpy>=4.0.0"
          pip install iminuit papermill nbformat nbclient nbconvert pytest nbval pytest-forked
          pip install -e "."

      - name: Discover and Categorize notebooks
        run: |
          python - <<'PY'
          import glob
          import json
          import os

          # Target directories: documentation tutorials and raw examples
          paths = glob.glob('docs/web/**/*.ipynb', recursive=True) + glob.glob('examples/**/*.ipynb', recursive=True)
          
          light_nbs = []
          heavy_nbs = []
          display_only = []

          for nb_path in paths:
              if '_build' in nb_path: continue
              try:
                  with open(nb_path, 'r', encoding='utf-8') as f:
                      nb = json.load(f)
                      tags = nb.get('cells', [{}])[0].get('metadata', {}).get('tags', [])
                      
                      if 'display-only' in tags:
                          display_only.append(nb_path)
                      elif 'ci-heavy' in tags:
                          heavy_nbs.append(nb_path)
                      else:
                          # Default to light if no tag or 'ci-light'
                          light_nbs.append(nb_path)
              except Exception as e:
                  print(f"Error reading {nb_path}: {e}")

          print(f"Discovered: {len(light_nbs)} Light, {len(heavy_nbs)} Heavy, {len(display_only)} Display-only")
          
          with open('light_nbs.txt', 'w') as f: f.write('\n'.join(light_nbs))
          with open('heavy_nbs.txt', 'w') as f: f.write('\n'.join(heavy_nbs))
          PY

      - name: Run Light Notebooks (Full Execution)
        run: |
          if [ ! -s light_nbs.txt ]; then
            echo "No light notebooks to run"
          else
            # Execute with papermill to ensure reproducibility
            while IFS= read -r nb; do
              echo "Executing: $nb"
              papermill "$nb" /dev/null --kernel python3
            done < light_nbs.txt
          fi

      - name: Run Heavy Notebooks (Syntax Check)
        run: |
          if [ ! -s heavy_nbs.txt ]; then
            echo "No heavy notebooks to check"
          else
            # Only check syntax and existence of outputs without full re-run
            xargs -a heavy_nbs.txt -r pytest --nbval-lax -v -q
          fi
