name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-forked nbval iminuit
          pip install -e . --no-deps

      - name: Notebook syntax check
        run: |
          python -m pip install nbformat nbconvert
          python - <<'PY'
import sys, nbformat
from pathlib import Path
errs=0
for p in Path('docs').rglob('*.ipynb'):
    if '.ipynb_checkpoints' in str(p): continue
    try:
        nbformat.read(p, as_version=4)
    except Exception as e:
        print(f"NB_PARSE_ERROR: {p}: {e}", file=sys.stderr)
        errs += 1
if errs:
    print(f"{errs} notebook parse errors", file=sys.stderr)
    sys.exit(2)
print("notebook parse ok")
PY

      - name: Install GUI dependencies (conditional)
        if: contains(github.event.head_commit.message, '[gui-test]')
        run: |
          pip install pytest-qt qtpy PyQt5 pyqtgraph
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run ruff
        if: matrix.python-version == '3.12'
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ github.base_ref }}" != "" ]; then
            echo "Linting changed files only (vs ${{ github.base_ref }})"
            git fetch origin ${{ github.base_ref }}
            git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' | xargs -r ruff check
          else
            echo "Linting entire project"
            ruff check .
          fi

      - name: Dead code check
        if: matrix.python-version == '3.12'
        continue-on-error: true
        run: |
          pip install vulture
          vulture gwexpy/ --min-confidence 80

      - name: Generate synthetic test fixtures
        run: |
          python tests/fixtures/generate_fixtures.py

      - name: Run tests (without GUI)
        if: "!contains(github.event.head_commit.message, '[gui-test]')"
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          # Use -m "not network" by default to avoid CI timeouts
          PYTEST_OPTS=(-q -p no:pytest-qt --doctest-modules --forked --nbmake --nbmake-timeout=600 --nbmake-kernel=python3 --cov=gwexpy --cov-report=xml --ignore=tests/gui/)
          if [[ ! "${{ github.event.head_commit.message }}" =~ "\[network-test\]" ]]; then
            PYTEST_OPTS+=(-m "not network")
          fi
          pytest "${PYTEST_OPTS[@]}" tests/ gwexpy/

      - name: Run paper notebooks
        if: "!contains(github.event.head_commit.message, '[gui-test]')"
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          if [ -d examples/paper-figures/ ] && find examples/paper-figures/ -name '*.ipynb' -print -quit | grep -q .; then
            pytest -q --nbmake examples/paper-figures/ --nbmake-timeout=600 --nbmake-kernel=python3
          else
            echo "No notebooks found in examples/paper-figures/, skipping."
          fi

      - name: Run paper notebook smoke script (synthetic)
        if: "!contains(github.event.head_commit.message, '[gui-test]') && matrix.python-version == '3.11'"
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          python examples/paper-figures/02_coherence_ranking.py

      - name: Run paper notebook smoke script (GWOSC, optional)
        if: "!contains(github.event.head_commit.message, '[gui-test]') && matrix.python-version == '3.11' && contains(github.event.head_commit.message, '[network-test]')"
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          pip install gwosc
          python examples/paper-figures/03_gwosc_case_study.py

      - name: Run tests (with GUI)
        if: contains(github.event.head_commit.message, '[gui-test]')
        env:
          PYTHONFAULTHANDLER: "1"
          PYTEST_SCREENSHOT_DIR: artifacts/screenshots
        run: |
          PYTEST_OPTS=(-q --doctest-modules --forked --nbmake --nbmake-timeout=600 --nbmake-kernel=python3 --cov=gwexpy --cov-report=xml)
          if [[ ! "${{ github.event.head_commit.message }}" =~ "\[network-test\]" ]]; then
            PYTEST_OPTS+=(-m "not network")
          fi
          xvfb-run -a -s "-screen 0 1920x1080x24" pytest "${PYTEST_OPTS[@]}" tests/ gwexpy/

      - name: Run paper notebooks (with GUI)
        if: contains(github.event.head_commit.message, '[gui-test]')
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          if [ -d examples/paper-figures/ ] && find examples/paper-figures/ -name '*.ipynb' -print -quit | grep -q .; then
            xvfb-run -a -s "-screen 0 1920x1080x24" pytest -q --nbmake examples/paper-figures/ --nbmake-timeout=600 --nbmake-kernel=python3
          else
            echo "No notebooks found in examples/paper-figures/, skipping."
          fi

      - name: Run paper notebook smoke script with GUI tag (synthetic)
        if: contains(github.event.head_commit.message, '[gui-test]') && matrix.python-version == '3.11'
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          xvfb-run -a -s "-screen 0 1920x1080x24" python examples/paper-figures/02_coherence_ranking.py

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload GUI failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gui-screenshots
          path: artifacts/screenshots
          if-no-files-found: ignore

  smoke-test-multiplatform:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Core only)
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0" "scipy<1.14" "astropy<7.0" pandas matplotlib h5py "gwpy>=4.0.0,<5.0.0"
          pip install pytest-forked nbval
          pip install -e . --no-deps

      - name: Run smoke tests
        shell: python
        run: |
          import gwexpy
          from gwexpy import TimeSeries, FrequencySeries, Spectrogram
          import numpy as np

          print(f"gwexpy version: {gwexpy.__version__}")

          # TimeSeries
          ts = TimeSeries(np.random.randn(100), sample_rate=1)
          print(f"TimeSeries OK: duration={ts.duration}")

          # FrequencySeries
          fs = FrequencySeries(np.abs(np.random.randn(100)), df=1)
          print(f"FrequencySeries OK: f0={fs.f0}")

          # Spectrogram
          sg = Spectrogram(np.random.randn(10, 10), dt=1, df=1)
          print(f"Spectrogram OK: shape={sg.shape}")

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-forked nbval
          pip install -e . --no-deps

      - name: Run mypy
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ github.base_ref }}" != "" ]; then
            echo "Type checking changed files only (vs ${{ github.base_ref }})"
            git fetch origin ${{ github.base_ref }}
            git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' | xargs -r mypy --ignore-missing-imports || true
          else
            echo "Type checking entire project"
            mypy gwexpy --ignore-missing-imports
          fi

  test-conda-full:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up micromamba (conda-forge)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gwexpy-full
          cache-environment: true
          cache-downloads: true
          # Use condarc (supported input) to enforce channel settings.
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          init-shell: bash
          generate-run-shell: false
          post-cleanup: none
          create-args: >-
            python=3.11
            pip
            iminuit
            control
            statsmodels
            scikit-learn
            PyWavelets
            pmdarima
            dcor
            hurst
            EMD-signal

      - name: Install system dependencies (conditional)
        if: contains(github.event.head_commit.message, '[gui-test]')
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies (locked)
        shell: bash -l {0}
        run: |
          micromamba run -n gwexpy-full python -m pip install --upgrade pip
          micromamba run -n gwexpy-full pip install -r requirements-dev.txt
          micromamba run -n gwexpy-full pip install pytest-forked nbval iminuit
          micromamba run -n gwexpy-full pip install -e . --no-deps

      - name: Install GUI dependencies (conditional)
        if: contains(github.event.head_commit.message, '[gui-test]')
        shell: bash -l {0}
        run: |
          micromamba run -n gwexpy-full pip install pytest-qt qtpy PyQt5 pyqtgraph
          # Optional tools: don't fail this job if unavailable.
          micromamba run -n gwexpy-full pip install cython || true
          if micromamba run -n gwexpy-full python scripts/install_minepy.py; then
            micromamba run -n gwexpy-full pip install mictools || true
          else
            echo "Skipping optional mictools setup (minepy build failed)."
          fi

      - name: Generate synthetic test fixtures
        shell: bash -l {0}
        run: |
          micromamba run -n gwexpy-full python tests/fixtures/generate_fixtures.py

      - name: Run unit tests (forked, without GUI)
        if: "!contains(github.event.head_commit.message, '[gui-test]')"
        timeout-minutes: 30
        env:
          PYTHONFAULTHANDLER: "1"
        shell: bash -l {0}
        run: |
          micromamba run -n gwexpy-full pytest -q -p no:pytest-qt --doctest-modules --forked --cov=gwexpy --ignore=tests/gui/ tests/ gwexpy/

      - name: Run unit tests (forked, with GUI)
        if: contains(github.event.head_commit.message, '[gui-test]')
        timeout-minutes: 30
        env:
          PYTHONFAULTHANDLER: "1"
        shell: bash -l {0}
        run: |
          micromamba run -n gwexpy-full xvfb-run -a -s "-screen 0 1920x1080x24" \
            pytest -q --doctest-modules --forked --cov=gwexpy tests/ gwexpy/

      - name: Run notebook tests
        timeout-minutes: 30
        env:
          PYTHONFAULTHANDLER: "1"
        shell: bash -l {0}
        run: |
          if ! find gwexpy -name '*.ipynb' -print -quit | grep -q .; then
            echo "No notebooks under gwexpy/, skipping nbmake."
            exit 0
          fi
          micromamba run -n gwexpy-full xvfb-run -a -s "-screen 0 1920x1080x24" \
            pytest -q --nbmake --nbmake-timeout=600 --nbmake-kernel=python3 gwexpy/

      - name: Run paper notebook smoke script (synthetic)
        timeout-minutes: 30
        env:
          PYTHONFAULTHANDLER: "1"
        shell: bash -l {0}
        run: |
          micromamba run -n gwexpy-full python examples/paper-figures/02_coherence_ranking.py

  build:
    name: Build and verify package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Test clean install (wheel)
        run: |
          python -m venv /tmp/test-venv
          source /tmp/test-venv/bin/activate
          pip install dist/*.whl
          python -c "import gwexpy; print(f'gwexpy version: {gwexpy.__version__}')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
