name: PR Fast

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/pull_request_template.md"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Ruff, mypy, pytest, and smoke build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps
          python -m pip install PyQt5
          python -m pip install iminuit

      - name: Generate synthetic test fixtures
        run: python tests/fixtures/generate_fixtures.py

      - name: Run Ruff
        run: ruff check gwexpy tests

      - name: Check forbidden generated artifacts
        run: python scripts/check_forbidden_artifacts.py

      - name: Run mypy
        run: mypy gwexpy tests/docs/test_tutorial_notebook_quality.py --ignore-missing-imports

      - name: Run pytest
        run: |
          pytest -q -m "not network and not nds" \
            --ignore=tests/gui/ \
            --ignore=tests/nds/ \
            --ignore=tests/io/ \
            --ignore=tests/segments/ \
            --ignore=tests/table/ \
            --ignore=tests/test_geomap.py \
            --ignore=tests/time/test_time.py \
            --ignore=tests/test_fitting_highlevel.py \
            --ignore=tests/timeseries/test_matrix_analysis.py \
            --ignore=tests/types/test_series_matrix_io.py \
            tests/ gwexpy/

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Import smoke test
        run: |
          python - <<'PY'
          import gwexpy

          print(f"gwexpy version: {gwexpy.__version__}")
          PY
