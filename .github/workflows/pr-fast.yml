name: PR Fast

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/pull_request_template.md"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Ruff, mypy, pytest, and smoke build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps
          python -m pip install PyQt5
          python -m pip install qtpy
          python -m pip install iminuit

      - name: Run PR-fast gate
        run: python scripts/ci/run_gate.py pr-fast

  io-contract-gate:
    name: Core I/O contract gate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps
          python -m pip install PyQt5
          python -m pip install qtpy
          python -m pip install iminuit

      - name: Run I/O contract tests
        run: python scripts/ci/run_gate.py io-contract

  io-optional-gate:
    name: Optional dependency gate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps
          python -m pip install PyQt5
          python -m pip install qtpy
          python -m pip install freezegun xarray netCDF4 nptdms pydub tinytag

      - name: Run optional dependency tests
        run: python scripts/ci/run_gate.py io-optional

  interop-contract-gate:
    name: Interop contract gate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps
          python -m pip install PyQt5
          python -m pip install qtpy

      - name: Run interop contract tests
        run: python scripts/ci/run_gate.py interop-contract
