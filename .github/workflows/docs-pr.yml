name: Docs PR

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/check_terms.py"
      - "scripts/check_docs_sync.py"
      - "scripts/run_quickstart_test.py"
      - "docs/requirements.txt"
      - "environment.yml"
      - "pyproject.toml"
      - ".github/workflows/docs-pr.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs-pr:
    name: Docs build and smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
      NBS_EXECUTE: never
      NBS_ALLOW_ERRORS: "0"
      MPLCONFIGDIR: /tmp/matplotlib
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 pandoc fonts-noto-cjk

      - name: Provision gwexpy docs environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install -r docs/requirements.txt
          python -m pip install sphinx-intl papermill nbformat nbclient nbconvert

      - name: Check terminology consistency
        run: python scripts/check_terms.py

      - name: Check JA/EN synchronization
        run: python scripts/check_docs_sync.py

      - name: Check forbidden generated artifacts
        run: python scripts/check_forbidden_artifacts.py

      - name: Run quickstart tests
        run: |
          python scripts/run_quickstart_test.py --lang ja
          python scripts/run_quickstart_test.py --lang en

      - name: Check changed notebooks
        run: |
          python scripts/notebook_gen/check_changed_notebooks.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}"

      - name: Build Sphinx HTML
        run: |
          cd docs
          sphinx-build -b html -W --keep-going \
            -D nbsphinx_execute=never \
            -D nbsphinx_allow_errors=0 \
            . _build/html
