name: Docs Quality Check (strict)

# Trigger only on PRs to ensure notebook execution quality
# This workflow enforces strict notebook execution without errors
on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs-build.yml'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-quality-audit:
    name: Terminology & Sync Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Terminology check (JA)
        run: python scripts/check_terms.py

      - name: JA/EN Synchronization check
        run: python scripts/check_docs_sync.py

  docs-build-and-test:
    name: Build, Linkcheck & Quickstart Test
    runs-on: ubuntu-latest
    needs: static-quality-audit
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 pandoc

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Core documentation tools
          pip install 'sphinx>=6,<8' 'docutils>=0.18,<0.22' sphinx_rtd_theme myst-parser nbsphinx nbconvert ipykernel
          pip install sphinx-intl sphinx-design sphinx-last-updated-by-git sphinx-sitemap
          # Scientific stack
          pip install 'numpy<2.0' 'scipy<1.14' pandas matplotlib astropy h5py
          pip install 'gwpy>=3.0.5' lalsuite
          # Optional dependencies for notebook examples
          pip install control statsmodels pmdarima iminuit PyWavelets EMD-signal
          pip install ligo.skymap astropy-healpix gwinc inspiral-range
          # Install gwexpy from source with all extras
          pip install -e ".[all]"

      - name: Register Jupyter kernel
        run: |
          python -m ipykernel install --user --name python3

      - name: Run Quickstart Test (JA)
        run: python scripts/run_quickstart_test.py --lang ja

      - name: Run Quickstart Test (EN)
        run: python scripts/run_quickstart_test.py --lang en

      - name: Build documentation (strict mode)
        env:
          NBS_EXECUTE: always
          NBS_ALLOW_ERRORS: "false"
        run: |
          cd docs
          sphinx-build -b html -W --keep-going . _build/html

      - name: Run Link Check
        run: |
          cd docs
          # Linkcheck often has flaky external sites, but we want it strict for internal links
          sphinx-build -b linkcheck . _build/linkcheck

      - name: Upload HTML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-html-strict
          path: docs/_build/html
          retention-days: 7

      - name: Comment on PR (success)
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Documentation quality audit passed.**\n\n- Terminology & Sync: OK\n- Quickstart code: OK\n- Sphinx Build: OK\n- Link Check: OK\n\nDownload the [HTML artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) to review.'
            })

      - name: Comment on PR (failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Documentation quality audit failed.**\n\nPlease check the [build logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\nPossible causes:\n- Suspicious terminology used\n- JA/EN heading mismatch\n- Quickstart code errors\n- Broken internal links'
            })
