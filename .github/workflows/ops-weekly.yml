name: Ops Weekly

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-health:
    name: Docs health
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      NBS_EXECUTE: never
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 pandoc

      - name: Provision gwexpy docs environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install requests -r docs/requirements.txt

      - name: Run docs health checks
        run: |
          python scripts/check_terms.py
          python scripts/check_docs_sync.py
          python scripts/check_external_links.py
          python scripts/update_intersphinx_inventories.py --check-upstream
          cd docs
          sphinx-build -b linkcheck . _build/linkcheck

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy audit environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pip-audit bandit

      - name: Run pip-audit
        run: pip-audit -r requirements-dev.txt

      - name: Run bandit
        run: bandit -r gwexpy -ll

      - name: Summarize outdated packages
        run: |
          python -m pip list --outdated --format=columns | tee outdated-packages.txt
          {
            echo "## Outdated packages"
            echo
            echo '```text'
            cat outdated-packages.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
