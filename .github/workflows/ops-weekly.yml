name: Ops Weekly

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs-health:
    name: Docs health
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      NBS_EXECUTE: never
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 pandoc

      - name: Provision gwexpy docs environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install requests -r docs/requirements.txt

      - name: Run docs consistency checks
        run: |
          python scripts/check_terms.py
          python scripts/check_docs_sync.py
          python scripts/update_intersphinx_inventories.py --check-upstream

      - name: Check external links (advisory)
        continue-on-error: true
        run: |
          set +e
          python scripts/check_external_links.py | tee external-links.txt
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## External link scan"
            echo
            echo "Exit status: ${status}"
            echo
            echo '```text'
            tail -n 80 external-links.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Sphinx linkcheck (advisory)
        continue-on-error: true
        run: |
          cd docs
          set +e
          sphinx-build -b linkcheck . _build/linkcheck 2>&1 | tee ../docs-linkcheck.txt
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## Sphinx linkcheck"
            echo
            echo "Exit status: ${status}"
            echo
            echo '```text'
            tail -n 120 ../docs-linkcheck.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy audit environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pip-audit bandit

      - name: Run pip-audit
        continue-on-error: true
        run: |
          set +e
          pip-audit -r requirements-dev.txt | tee pip-audit.txt
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## pip-audit"
            echo
            echo "Exit status: ${status}"
            echo
            echo '```text'
            cat pip-audit.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run bandit
        continue-on-error: true
        run: |
          set +e
          bandit -r gwexpy -ll | tee bandit.txt
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## Bandit"
            echo
            echo "Exit status: ${status}"
            echo
            echo '```text'
            cat bandit.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize outdated packages
        run: |
          python -m pip list --outdated --format=columns | tee outdated-packages.txt
          {
            echo "## Outdated packages"
            echo
            echo '```text'
            cat outdated-packages.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
