name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  # Job for static analysis and external link checking
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check terminology consistency (JA)
        run: python scripts/check_terms.py

      - name: Check ja/en synchronization
        run: python scripts/check_docs_sync.py

  # Job for building the HTML documentation and link checking
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: docs
          python-version: "3.11"
          channels: conda-forge
          miniforge-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libkrb5-dev

      - name: Install documentation dependencies
        shell: bash -l {0}
        run: |
          conda install -y "numpy<2" "scipy<1.14" pandas matplotlib h5py gwpy nds2-client lalsuite framel \
            sphinx sphinx_rtd_theme myst-parser nbsphinx pandoc ipykernel
          pip install sphinx-intl sphinx-design
          pip install --no-deps .

      - name: Build documentation (Strict)
        shell: bash -l {0}
        run: |
          mkdir -p docs/_build/html
          # -W turns warnings into errors
          sphinx-build -b html -W -d docs/_build/doctrees docs docs/_build/html/docs

      - name: Run internal link check
        shell: bash -l {0}
        run: |
          sphinx-build -b linkcheck docs docs/_build/linkcheck

      - name: Generate root redirect
        run: |
          printf "<html><head><meta http-equiv=\"refresh\" content=\"0; url=docs/index.html\"></head><body>Redirecting to documentation...</body></html>" > docs/_build/html/index.html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
          force_orphan: true

  # Job for verifying the Quickstart code snippets
  quickstart-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: test
          python-version: "3.11"
          channels: conda-forge

      - name: Install project with dependencies
        shell: bash -l {0}
        run: |
          conda install -y "numpy<2" "scipy<1.14" pandas matplotlib h5py gwpy
          pip install -e .

      - name: Run Quickstart integration tests (JA)
        shell: bash -l {0}
        run: python scripts/run_quickstart_test.py --lang ja

      - name: Run Quickstart integration tests (EN)
        shell: bash -l {0}
        run: python scripts/run_quickstart_test.py --lang en
