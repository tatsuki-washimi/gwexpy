name: Extended Nightly

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Nightly is intentionally scoped to lightweight cross-platform import smoke.
  # Deeper validation now lives in PR Fast, Docs PR/Pages, and Test (gwpy-compat).
  multiplatform-smoke-unix:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install -e . --no-deps

      - name: Run import smoke test
        run: |
          python - <<'PY'
          import gwexpy
          import numpy as np
          from gwexpy import FrequencySeries, Spectrogram, TimeSeries

          ts = TimeSeries(np.random.randn(100), sample_rate=1)
          fs = FrequencySeries(np.abs(np.random.randn(100)), df=1)
          sg = Spectrogram(np.random.randn(10, 10), dt=1, df=1)
          print(gwexpy.__version__, ts.duration, fs.f0, sg.shape)
          PY

  multiplatform-smoke-windows:
    name: Smoke test (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: powershell

      - name: Provision gwexpy environment
        shell: pwsh
        run: |
          micromamba activate gwexpy
          python -m pip install -e . --no-deps
          python -c "import sys; print(sys.executable)"

      - name: Run import smoke test
        shell: pwsh
        run: |
          micromamba activate gwexpy
          python -c "import gwexpy, numpy as np; from gwexpy import TimeSeries, FrequencySeries, Spectrogram; ts = TimeSeries(np.random.randn(100), sample_rate=1); fs = FrequencySeries(np.abs(np.random.randn(100)), df=1); sg = Spectrogram(np.random.randn(10, 10), dt=1, df=1); print(gwexpy.__version__, ts.duration, fs.f0, sg.shape)"

  io-network-backend-gate:
    name: I/O backend and network gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps

      - name: Generate synthetic test fixtures
        run: python tests/fixtures/generate_fixtures.py

      - name: Run network/backend I/O tests
        run: |
          pytest -q -m "network or nds" \
            tests/io/ \
            tests/nds/ \
            tests/segments/ \
            tests/timeseries/test_timeseries.py

      - name: Run Kerberos backend smoke
        run: pytest -q tests/io/test_kerberos.py

  docs-notebook-gate:
    name: Docs notebook execution gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
      GWEXPY_RUN_NOTEBOOK_TESTS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps

      - name: Generate synthetic test fixtures
        run: python tests/fixtures/generate_fixtures.py

      - name: Run docs notebook tests
        run: pytest -q tests/docs/test_docs_notebooks.py

  io-zarr-gate:
    name: Zarr I/O gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
      GWEXPY_ALLOW_ZARR: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: gwexpy
          create-args: >-
            python=3.11
          init-shell: bash

      - name: Provision gwexpy environment
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . --no-deps
          python -m pip install zarr

      - name: Generate synthetic test fixtures
        run: python tests/fixtures/generate_fixtures.py

      - name: Run Zarr I/O tests
        run: pytest -q tests/io/test_zarr_reader.py
