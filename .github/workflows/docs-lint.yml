name: docs-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run non-ASCII check (CJK detection)
        run: |
          python scripts/check_non_ascii.py --root gwexpy

      - name: Run ruff (docstring hardening)
        continue-on-error: true
        run: |
          pip install ruff
          # Specifically check for docstring related rules (D) and English-primary compliance
          ruff check gwexpy --select D
