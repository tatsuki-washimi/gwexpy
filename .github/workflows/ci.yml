name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ github.base_ref }}" != "" ]; then
            echo "Linting changed files only (vs ${{ github.base_ref }})"
            git fetch origin ${{ github.base_ref }}
            git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' | xargs -r ruff check
          else
            echo "Linting entire project"
            ruff check gwexpy/
          fi

      - name: Mypy
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ github.base_ref }}" != "" ]; then
            echo "Type checking changed files only (vs ${{ github.base_ref }})"
            git fetch origin ${{ github.base_ref }}
            git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' | xargs -r mypy || true
          else
            echo "Type checking entire project"
            mypy gwexpy/
          fi
