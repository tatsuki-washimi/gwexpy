name: Test (gwpy-compat)

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/pull_request_template.md"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gwpy-compat:
    name: GWpy compatibility
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      PYTHONFAULTHANDLER: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gwexpy
          create-args: >-
            python=3.11
            pip
          init-shell: bash

      - name: Provision compatibility environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<2.0" "scipy<1.14" "astropy<7.0" pandas matplotlib h5py "gwpy>=4.0.0,<5.0.0"
          python -m pip install pytest pytest-forked
          python -m pip install -e . --no-deps

      - name: Run focused compatibility tests
        run: |
          pytest -q \
            tests/timeseries/test_transfer_function_compat.py \
            tests/timeseries/test_collections_spectral_compat.py \
            tests/timeseries/test_fft_param_compat.py

      - name: Run full timeseries suite
        run: pytest -q tests/timeseries
