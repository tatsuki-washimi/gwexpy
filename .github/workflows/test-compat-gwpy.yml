name: Test (gwpy-compat)

on:
  push:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  gwpy-compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep GWpy/Astropy compatibility stable in CI.
          pip install "numpy<2.0" "astropy<7.0"
          pip install ".[dev,analysis]"
          pip install pytest-forked

      - name: Run gwpy-compat focused tests
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          pytest -q \
            tests/timeseries/test_transfer_function_compat.py \
            tests/timeseries/test_collections_spectral_compat.py \
            tests/timeseries/test_fft_param_compat.py

      - name: Run full timeseries tests
        env:
          PYTHONFAULTHANDLER: "1"
        run: |
          pytest -q tests/timeseries
