name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 1"  # 毎週月曜 12:00 JST

permissions:
  contents: read

jobs:
  # 1. 依存関係の脆弱性スキャン (pip-audit)
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (Full)
        run: |
          # フルスキャンを行うために全ての optional 依存をインストール
          pip install .[all]
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit

  # 2. 静的解析スキャン (bandit)
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        # -r: recursive, -ll: medium 以上の警告のみ表示
        run: bandit -r gwexpy -ll

  # 3. GitHub CodeQL スキャン
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
