version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    # No automated pinning yet, as we are following a "manual review" policy.
    # New PRs will be assigned to the maintainer.
    reviewers:
      - "tatsuki-washimi"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "tatsuki-washimi"
