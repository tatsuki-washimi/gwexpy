# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: strip-tracked-notebook-outputs
        name: strip-tracked-notebook-outputs
        entry: python scripts/strip_example_notebook_outputs.py
        language: python
        files: ^(docs/web/|examples/).*\.ipynb$
      - id: check-forbidden-artifacts
        name: check-forbidden-artifacts
        entry: python scripts/check_forbidden_artifacts.py
        language: python
      - id: check-repo-hygiene
        name: check-repo-hygiene
        entry: python scripts/check_repo_hygiene.py
        language: python
      - id: check-non-ascii
        name: check-non-ascii
        entry: python scripts/check_non_ascii.py
        language: python
        files: \.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^gwexpy/
        args: [--ignore-missing-imports]
        additional_dependencies: [types-requests, numpy, pandas, matplotlib, astropy]
